<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧之塔：學霸挑戰賽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- 引入彩帶特效套件 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            overflow-x: hidden;
            touch-action: manipulation; /* 改善 iOS 點擊體驗 */
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .animate-bounce-custom { animation: bounce 0.5s ease-in-out; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .animate-shake { animation: shake 0.5s; }

        .btn-option {
            background-color: #1e293b;
            color: #f1f5f9;
            border: 2px solid #334155;
            transition: all 0.2s;
        }
        .btn-option:hover {
            background-color: #334155;
            border-color: #475569;
            transform: scale(1.02);
        }
        .btn-option:active { transform: scale(0.98); }

        .tower-bg {
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 2px, transparent 2px);
            background-size: 40px 40px;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 遊戲主容器 -->
    <div id="game-container" class="w-full max-w-md bg-gray-900/80 backdrop-blur-md rounded-3xl shadow-2xl border border-gray-700 overflow-hidden relative tower-bg">
        
        <!-- ================= 畫面 1：開始畫面 ================= -->
        <div id="screen-start" class="p-8 flex flex-col items-center justify-center min-h-[650px] text-center">
            <div class="text-6xl mb-4 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]">🏰</div>
            <h1 class="text-4xl font-black mb-2 text-yellow-400 drop-shadow-md">智慧之塔</h1>
            <h2 class="text-xl font-bold mb-8 text-gray-300">學霸挑戰賽</h2>
            <div class="mb-8 text-gray-300 leading-relaxed bg-black/40 p-5 rounded-xl border border-gray-700 text-sm">
                題庫隨機抽取 <span class="text-yellow-400 font-bold">50 題</span><br>
                你有 <span class="text-red-400">❤️❤️❤️</span> 三次機會<br>
                最快登頂並獲得高分，挑戰排行榜！
            </div>
            <button onclick="startGame()" class="w-full mb-4 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-4 px-8 rounded-full text-xl shadow-[0_0_20px_rgba(79,70,229,0.4)] hover:scale-105 transition-transform">
                開始挑戰 🚀
            </button>
            <button onclick="showLeaderboard()" class="w-full bg-gray-800 text-yellow-400 font-bold py-3 px-8 rounded-full shadow-lg border border-gray-600 hover:bg-gray-700 transition-colors">
                🏆 查看排行榜
            </button>
        </div>

        <!-- ================= 畫面 2：遊戲進行中 ================= -->
        <div id="screen-game" class="hidden flex flex-col min-h-[650px]">
            <!-- 頂部狀態列 -->
            <div class="bg-black/60 p-3 flex justify-between items-center border-b border-gray-700 text-sm">
                <div class="flex flex-col items-start gap-1">
                    <button onclick="goHome()" class="text-gray-400 hover:text-white transition flex items-center gap-1 text-xs">
                        🏠 首頁
                    </button>
                    <!-- 實體愛心血條 -->
                    <span id="lives-display" class="text-lg tracking-widest text-red-500">❤️❤️❤️</span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="font-black text-3xl text-yellow-400 drop-shadow-sm" id="floor-display">1F</span>
                    <span id="timer-display" class="font-mono text-blue-300 font-bold">⏱️ 00:00</span>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-xs text-gray-400">分數</span>
                    <span id="score-display" class="font-bold text-green-400 text-xl">0</span>
                </div>
            </div>

            <!-- 進度條 -->
            <div class="w-full h-1.5 bg-gray-800">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-blue-400 to-purple-500 transition-all duration-500 shadow-[0_0_10px_rgba(168,85,247,0.8)]" style="width: 0%;"></div>
            </div>

            <!-- 題目區 -->
            <div class="flex-1 p-6 flex flex-col">
                <div class="flex justify-between items-start mb-4">
                    <span id="subject-badge" class="px-3 py-1 rounded-full text-sm font-bold shadow-sm flex items-center gap-1"></span>
                    <span id="level-badge" class="text-gray-300 text-xs font-bold bg-gray-800 border border-gray-600 px-2 py-1 rounded"></span>
                </div>
                
                <h3 id="question-text" class="text-2xl font-bold mb-6 leading-snug min-h-[80px] text-gray-100">
                    <!-- 題目內容 -->
                </h3>

                <!-- 選項區 -->
                <div id="options-container" class="grid grid-cols-1 gap-3 mt-auto mb-4">
                    <!-- 動態生成 -->
                </div>
            </div>
        </div>

        <!-- ================= 畫面 3：遊戲結束/結算 ================= -->
        <div id="screen-result" class="hidden p-8 flex flex-col items-center justify-center min-h-[650px] text-center">
            <div id="result-icon" class="text-7xl mb-2">💀</div>
            <h1 id="result-title" class="text-4xl font-black mb-4">遊戲結束</h1>
            
            <div class="bg-gray-800/80 p-5 rounded-2xl w-full mb-6 border border-gray-600 shadow-inner grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <p class="text-sm text-gray-400">最終樓層</p>
                    <p class="text-4xl font-black text-yellow-400" id="final-floor">15F</p>
                </div>
                <div class="bg-gray-900 rounded-xl p-3 border border-gray-700">
                    <p class="text-xs text-gray-400 mb-1">總分</p>
                    <p class="text-2xl font-bold text-green-400" id="final-score">1500</p>
                </div>
                <div class="bg-gray-900 rounded-xl p-3 border border-gray-700">
                    <p class="text-xs text-gray-400 mb-1">時間</p>
                    <p class="text-2xl font-mono text-blue-300" id="final-time">02:30</p>
                </div>
            </div>

            <!-- 登記排行榜區塊 -->
            <div id="submit-section" class="w-full mb-6">
                <input type="text" id="player-name" placeholder="輸入你的暱稱..." class="w-full bg-gray-900 border border-gray-600 text-white px-4 py-3 rounded-xl mb-3 focus:outline-none focus:border-blue-500 text-center">
                <p id="system-msg" class="text-sm text-red-400 mb-2 hidden"></p>
                <button onclick="submitScore()" id="btn-submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-xl transition-colors">
                    📝 登記分數到排行榜
                </button>
                <p id="submit-msg" class="text-sm text-green-400 mt-2 hidden">✅ 成績已上傳！</p>
            </div>

            <div class="flex w-full gap-3">
                <button onclick="goHome()" class="flex-1 bg-gray-700 text-white font-bold py-3 rounded-xl hover:bg-gray-600 transition-colors">
                    🏠 首頁
                </button>
                <button onclick="startGame()" class="flex-1 bg-gradient-to-r from-orange-500 to-red-500 text-white font-bold py-3 rounded-xl hover:scale-105 transition-transform shadow-[0_0_15px_rgba(249,115,22,0.4)]">
                    🔄 再戰一次
                </button>
            </div>
        </div>

        <!-- ================= 畫面 4：排行榜 ================= -->
        <div id="screen-leaderboard" class="hidden flex flex-col min-h-[650px] max-h-[650px]">
            <div class="p-6 bg-gray-900 border-b border-gray-700 flex justify-between items-center shrink-0">
                <h2 class="text-2xl font-black text-yellow-400">🏆 英雄榜</h2>
                <button onclick="goHome()" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm border border-gray-600 hover:bg-gray-700 transition">首頁</button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 bg-gray-900/50 relative">
                <div id="loading-leaderboard" class="absolute inset-0 flex items-center justify-center text-gray-400 animate-pulse">
                    讀取資料中...
                </div>
                <div id="leaderboard-list" class="flex flex-col gap-2">
                    <!-- 排行榜動態生成 -->
                </div>
            </div>
        </div>

        <!-- ================= 對錯回饋與解析覆蓋層 ================= -->
        <div id="feedback-overlay" class="absolute inset-0 bg-gray-900/95 flex items-center justify-center flex-col z-50 hidden opacity-0 transition-opacity duration-300 p-6 text-center backdrop-blur-md">
            <div id="feedback-icon" class="text-7xl mb-4 transform scale-50 transition-transform duration-300"></div>
            <h2 id="feedback-text" class="text-3xl font-black mb-2 text-white"></h2>
            
            <!-- 解析區塊 (答錯時顯示) -->
            <div id="feedback-explanation" class="hidden bg-gray-800 border border-gray-600 p-5 rounded-xl w-full max-w-sm mt-4 text-left shadow-lg">
                <p class="text-sm text-gray-400 mb-1">正確答案：</p>
                <p id="correct-ans-text" class="text-lg font-bold text-green-400 mb-3"></p>
                <p class="text-sm text-gray-400 mb-1">💡 解析提示：</p>
                <p id="hint-explanation-text" class="text-gray-200 leading-relaxed"></p>
            </div>

            <!-- 手動跳下一題按鈕 -->
            <button id="btn-next-question" onclick="nextQuestion()" class="hidden mt-8 bg-gradient-to-r from-blue-600 to-blue-500 text-white font-bold py-3 px-10 rounded-full text-lg shadow-[0_0_15px_rgba(59,130,246,0.5)] hover:scale-105 transition">
                繼續挑戰 ➡️
            </button>
        </div>

    </div>

    <script>
        // ========================================================
        // 🚨 GAS 網址 (保留你原有的設定)
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyd2-qBrAOlhwXg4LubylFiACT6OVZZ1S3XO29FeMvzk_7105LD5NeQMExyPxsnP5mX/exec";
        // ========================================================

        // ================= 音效合成器 (Web Audio API) =================
        // 這個做法不需依賴外部 MP3 檔案，且能在 iOS 上順利播放
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.3, now + 0.05);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.3);
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.3, now + 0.05);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'win') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.setValueAtTime(554.37, now + 0.15);
                osc.frequency.setValueAtTime(659.25, now + 0.3);
                osc.frequency.setValueAtTime(880, now + 0.45);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 1.0);
                osc.start(now);
                osc.stop(now + 1.0);
            } else if (type === 'lose') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.8);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.8);
                osc.start(now);
                osc.stop(now + 0.8);
            }
        }

        // ================= 完整 200 題題庫 (已移除年級前綴) =================
        const allQuestions = [
            // === 數學 (34題) ===
            { subject: "math", level: 1, question: "一個「周角」等於多少度？", options: ["90度", "180度", "270度", "360度"], answer: 3, hint: "周角代表繞圓一整圈的角度喔！" },
            { subject: "math", level: 1, question: "1公斤（kg）等於多少公克（g）？", options: ["10公克", "100公克", "1000公克", "10000公克"], answer: 2, hint: "Kilo 這個字首有 1000 的意思。" },
            { subject: "math", level: 2, question: "下列哪一個數字是「質數」？", options: ["9", "11", "15", "21"], answer: 1, hint: "質數是只有 1 和自己兩個因數的數字。" },
            { subject: "math", level: 2, question: "三角形的面積公式是什麼？", options: ["長 × 寬", "底 × 高", "底 × 高 ÷ 2", "邊長 × 邊長"], answer: 2, hint: "三角形面積是平行四邊形面積的一半。" },
            { subject: "math", level: 2, question: "分數 1/2 加上 1/4 的結果是多少？", options: ["2/6", "3/4", "1/8", "1/6"], answer: 1, hint: "要先通分喔！1/2 可以變成 2/4。" },
            { subject: "math", level: 3, question: "圓周率（π）大約等於多少？", options: ["3.14", "3.41", "3.04", "4.13"], answer: 0, hint: "這是圓周長除以直徑的固定比值。" },
            { subject: "math", level: 3, question: "汽車 2 小時開了 120 公里，它的「時速」是多少？", options: ["60公里", "120公里", "240公里", "100公里"], answer: 0, hint: "速率 = 距離 ÷ 時間。" },
            { subject: "math", level: 3, question: "地圖上 1 公分代表實際距離 1000 公分，比例尺為？", options: ["1:100", "1:1000", "1:10000", "1:10"], answer: 1, hint: "比例尺就是地圖距離與實際距離的比值。" },
            { subject: "math", level: 3, question: "半徑 10 公分的圓，面積大約是多少平方公分？", options: ["31.4", "62.8", "314", "3140"], answer: 2, hint: "圓面積 = 半徑 × 半徑 × 3.14。" },
            { subject: "math", level: 4, question: "如果 2x + 5 = 15，那麼 x 等於多少？", options: ["4", "5", "10", "20"], answer: 1, hint: "先將 15 減去 5，再除以 2。" },
            { subject: "math", level: 1, question: "正方形的邊長是 5 公分，周長是多少？", options: ["10公分", "15公分", "20公分", "25公分"], answer: 2, hint: "正方形有四個一樣長的邊。" },
            { subject: "math", level: 1, question: "一天有幾分鐘？", options: ["60分鐘", "1440分鐘", "3600分鐘", "86400分鐘"], answer: 1, hint: "24 小時 × 60 分鐘。" },
            { subject: "math", level: 2, question: "長方體的體積公式是？", options: ["長+寬+高", "長×寬×高", "底×高÷2", "(長+寬)×2"], answer: 1, hint: "三個維度相乘。" },
            { subject: "math", level: 2, question: "小數 0.75 化成分數是多少？", options: ["1/4", "1/2", "3/4", "4/5"], answer: 2, hint: "75/100 約分後是多少？" },
            { subject: "math", level: 2, question: "12 和 18 的最大公因數是？", options: ["2", "3", "6", "36"], answer: 2, hint: "找找能同時整除它們的最大的數。" },
            { subject: "math", level: 2, question: "4 和 6 的最小公倍數是？", options: ["12", "24", "2", "10"], answer: 0, hint: "找找它們共同的倍數中最小的。" },
            { subject: "math", level: 3, question: "3/4 乘以 4/5 等於多少？", options: ["12/20", "3/5", "7/9", "以上皆是"], answer: 1, hint: "分子乘分子，分母乘分母，然後約分。" },
            { subject: "math", level: 3, question: "將 20% 化為小數是？", options: ["2.0", "0.2", "0.02", "20.0"], answer: 1, hint: "百分比除以 100。" },
            { subject: "math", level: 3, question: "圓柱的體積怎麼算？", options: ["底面積 × 高", "圓周長 × 高", "半徑 × 高", "底面積 ÷ 高"], answer: 0, hint: "就像疊硬幣一樣，把底面積疊高。" },
            { subject: "math", level: 4, question: "直角三角形中，已知兩股為 3 和 4，斜邊長為何？", options: ["5", "6", "7", "25"], answer: 0, hint: "畢氏定理：a² + b² = c²" },
            { subject: "math", level: 2, question: "一盒巧克力有 24 顆，平分給 8 個人，每人得幾顆？", options: ["2", "3", "4", "6"], answer: 1, hint: "24 除以 8。" },
            { subject: "math", level: 1, question: "1 公升等於多少毫升 (ml)？", options: ["10", "100", "1000", "10000"], answer: 2, hint: "和公斤變公克一樣的倍數。" },
            { subject: "math", level: 2, question: "梯形的面積公式是？", options: ["底×高", "(上底+下底)×高÷2", "長×寬", "對角線相乘÷2"], answer: 1, hint: "要把上底和下底加起來喔。" },
            { subject: "math", level: 3, question: "一輛車時速 60 公里，開了 30 分鐘，移動了多遠？", options: ["30公里", "60公里", "120公里", "1800公里"], answer: 0, hint: "30 分鐘是半小時。" },
            { subject: "math", level: 3, question: "某商品定價 500 元，打八折後是多少錢？", options: ["480元", "420元", "400元", "350元"], answer: 2, hint: "500 乘以 0.8。" },
            { subject: "math", level: 3, question: "3 個蘋果 150 元，5 個蘋果多少元？", options: ["200", "250", "300", "350"], answer: 1, hint: "先算 1 個蘋果多少錢。" },
            { subject: "math", level: 4, question: "超綱題：-5 加上 8 的結果是？", options: ["-13", "-3", "3", "13"], answer: 2, hint: "欠 5 元，還了 8 元，還剩多少？" },
            { subject: "math", level: 4, question: "超綱題：2³ (2的3次方) 等於多少？", options: ["5", "6", "8", "9"], answer: 2, hint: "2 × 2 × 2。" },
            { subject: "math", level: 3, question: "一個圓的直徑是 10，它的周長大約是多少？", options: ["15.7", "31.4", "78.5", "314"], answer: 1, hint: "直徑 × 3.14。" },
            { subject: "math", level: 2, question: "5/8 和 3/4 哪一個比較大？", options: ["5/8", "3/4", "一樣大", "無法比較"], answer: 1, hint: "通分後比較，3/4 = 6/8。" },
            { subject: "math", level: 1, question: "一個平角是多少度？", options: ["90度", "180度", "270度", "360度"], answer: 1, hint: "一條直線的角度。" },
            { subject: "math", level: 2, question: "15 的因數有幾個？", options: ["2個", "3個", "4個", "5個"], answer: 2, hint: "1, 3, 5, 15。" },
            { subject: "math", level: 3, question: "速率、距離、時間的關係式，哪一個是錯的？", options: ["距離 = 速率 × 時間", "時間 = 距離 ÷ 速率", "速率 = 距離 ÷ 時間", "速率 = 時間 ÷ 距離"], answer: 3, hint: "速率是單位時間內走的距離。" },
            { subject: "math", level: 4, question: "超綱題：若 x/3 = 12，則 x 等於？", options: ["4", "9", "36", "48"], answer: 2, hint: "兩邊同乘 3。" },

            // === 國語 (34題) ===
            { subject: "chinese", level: 1, question: "下列哪個字形完全正確？", options: ["辛福", "辛苦", "幸苦", "辛運"], answer: 1, hint: "「辛」與「幸」很容易搞混喔！" },
            { subject: "chinese", level: 1, question: "「一隻馬」的正確量詞應該是什麼？", options: ["條", "頭", "匹", "口"], answer: 2, hint: "古人計算馬匹數量的特殊單位。" },

        let isAnswering = false;
        const TOTAL_QUESTIONS = 50; // 隨機抽選 50 題
        
        let timerInterval;
        let secondsElapsed = 0;

        const els = {
            screens: {
                start: document.getElementById('screen-start'),
                game: document.getElementById('screen-game'),
                result: document.getElementById('screen-result'),
                leaderboard: document.getElementById('screen-leaderboard')
            },
            lives: document.getElementById('lives-display'),
            floor: document.getElementById('floor-display'),
            score: document.getElementById('score-display'),
            timer: document.getElementById('timer-display'),
            progressBar: document.getElementById('progress-bar'),
            subjectBadge: document.getElementById('subject-badge'),
            levelBadge: document.getElementById('level-badge'),
            questionText: document.getElementById('question-text'),
            optionsContainer: document.getElementById('options-container'),
            feedbackOverlay: document.getElementById('feedback-overlay'),
            feedbackIcon: document.getElementById('feedback-icon'),
            feedbackText: document.getElementById('feedback-text'),
            feedbackExplanation: document.getElementById('feedback-explanation'),
            correctAnsText: document.getElementById('correct-ans-text'),
            hintText: document.getElementById('hint-explanation-text'),
            btnNext: document.getElementById('btn-next-question'),
            systemMsg: document.getElementById('system-msg')
        };

        // ================= 遊戲核心邏輯 =================
        
        // 洗牌演算法
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function showScreen(name) {
            Object.values(els.screens).forEach(s => s.classList.add('hidden'));
            els.screens[name].classList.remove('hidden');
        }

        function goHome() {
            clearInterval(timerInterval);
            showScreen('start');
        }

        function startGame() {
            // 解鎖 iOS 音效限制
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            // 洗牌並只抽取 50 題
            const shuffledBank = shuffle([...allQuestions]);
            currentQuestions = shuffledBank.slice(0, TOTAL_QUESTIONS);
            
            currentQuestionIndex = 0;
            floor = 1;
            lives = maxLives;
            score = 0;
            secondsElapsed = 0;
            
            document.getElementById('submit-msg').classList.add('hidden');
            document.getElementById('btn-submit').classList.remove('hidden');
            document.getElementById('btn-submit').disabled = false;
            document.getElementById('btn-submit').innerHTML = "📝 登記分數到排行榜";
            document.getElementById('player-name').value = "";
            els.systemMsg.classList.add('hidden');

            updateUI();
            startTimer();
            loadQuestion();
            showScreen('game');
        }

        function startTimer() {
            clearInterval(timerInterval);
            els.timer.textContent = "⏱️ 00:00";
            timerInterval = setInterval(() => {
                secondsElapsed++;
                const m = String(Math.floor(secondsElapsed / 60)).padStart(2, '0');
                const s = String(secondsElapsed % 60).padStart(2, '0');
                els.timer.textContent = `⏱️ ${m}:${s}`;
            }, 1000);
        }

        function updateUI() {
            els.lives.innerHTML = '❤️'.repeat(lives) + '<span class="opacity-20 filter grayscale">❤️</span>'.repeat(maxLives - lives);
            els.floor.textContent = floor + "F";
            els.score.textContent = score;
            const progress = (floor / TOTAL_QUESTIONS) * 100;
            els.progressBar.style.width = `${progress}%`;
        }

        function loadQuestion() {
            if (currentQuestionIndex >= currentQuestions.length || lives <= 0) {
                endGame();
                return;
            }

            isAnswering = false;
            const q = currentQuestions[currentQuestionIndex];
            const style = subjectStyles[q.subject] || { icon: "❓", name: "綜合", color: "bg-gray-700 text-gray-200" };

            els.subjectBadge.className = `px-3 py-1 rounded-full text-sm font-bold shadow-sm flex items-center gap-1 ${style.color}`;
            els.subjectBadge.innerHTML = `<span>${style.icon}</span> ${style.name}`;
            els.levelBadge.textContent = q.level === 4 ? "超綱 🌟" : `L${q.level}`;
            els.questionText.textContent = q.question;
            
            els.optionsContainer.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "btn-option w-full font-bold text-lg py-4 px-6 rounded-2xl text-left focus:outline-none flex gap-3";
                btn.innerHTML = `<span class="text-blue-400 font-black">${String.fromCharCode(65 + idx)}.</span> <span>${opt}</span>`;
                btn.onclick = () => checkAnswer(idx, btn);
                els.optionsContainer.appendChild(btn);
            });
            
            if (floor > 1) {
                document.getElementById('game-container').classList.add('animate-bounce-custom');
                setTimeout(() => document.getElementById('game-container').classList.remove('animate-bounce-custom'), 500);
            }
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (isAnswering) return;
            isAnswering = true;

            const q = currentQuestions[currentQuestionIndex];
            const isCorrect = (selectedIndex === q.answer);

            if (isCorrect) {
                playSound('correct'); // 播放答對音效
                
                btnElement.style.backgroundColor = "#16a34a";
                btnElement.style.borderColor = "#4ade80";
                
                score += (q.level * 100);
                
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#facc15', '#4ade80', '#60a5fa'] });

                setTimeout(() => {
                    floor++;
                    currentQuestionIndex++;
                    updateUI();
                    loadQuestion();
                }, 1000);

            } else {
                playSound('wrong'); // 播放答錯音效
                
                btnElement.style.backgroundColor = "#dc2626";
                btnElement.style.borderColor = "#f87171";
                document.getElementById('game-container').classList.add('animate-shake');
                
                lives--;
                updateUI();
                
                els.feedbackOverlay.classList.remove('hidden');
                setTimeout(() => {
                    els.feedbackOverlay.classList.remove('opacity-0');
                    els.feedbackIcon.classList.remove('scale-50');
                    els.feedbackIcon.classList.add('scale-100');
                }, 10);

                els.feedbackIcon.textContent = "❌";
                els.feedbackText.textContent = lives > 0 ? "喔不，答錯了！" : "生命值耗盡！";
                
                els.correctAnsText.textContent = q.options[q.answer];
                els.hintText.textContent = q.hint;
                els.feedbackExplanation.classList.remove('hidden');
                els.btnNext.classList.remove('hidden');
            }
        }

        function nextQuestion() {
            document.getElementById('game-container').classList.remove('animate-shake');
            
            els.feedbackOverlay.classList.add('opacity-0');
            els.feedbackIcon.classList.remove('scale-100');
            els.feedbackIcon.classList.add('scale-50');
            
            setTimeout(() => {
                els.feedbackOverlay.classList.add('hidden');
                els.feedbackExplanation.classList.add('hidden');
                els.btnNext.classList.add('hidden');
                
                if (lives <= 0) {
                    endGame();
                } else {
                    currentQuestionIndex++;
                    loadQuestion();
                }
            }, 300);
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('final-floor').textContent = floor + "F";
            document.getElementById('final-score').textContent = score;
            
            const m = String(Math.floor(secondsElapsed / 60)).padStart(2, '0');
            const s = String(secondsElapsed % 60).padStart(2, '0');
            document.getElementById('final-time').textContent = `${m}:${s}`;
            
            const rTitle = document.getElementById('result-title');
            if (lives <= 0) {
                playSound('lose'); // 播放失敗音效
                document.getElementById('result-icon').textContent = "💥";
                rTitle.textContent = "挑戰失敗";
                rTitle.className = "text-4xl font-black mb-4 text-red-400";
            } else {
                playSound('win'); // 播放過關音效
                document.getElementById('result-icon').textContent = "👑";
                rTitle.textContent = "完全制霸！";
                rTitle.className = "text-4xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-600";
                confetti({ particleCount: 300, spread: 120, origin: { y: 0.6 }});
            }

            showScreen('result');
        }

        // ================= 排行榜串接 (GAS) =================
        function showMessage(msg, isError = true) {
            els.systemMsg.textContent = msg;
            els.systemMsg.classList.remove('hidden');
            if(isError) {
                els.systemMsg.classList.replace('text-green-400', 'text-red-400');
            } else {
                els.systemMsg.classList.replace('text-red-400', 'text-green-400');
            }
        }

        async function submitScore() {
            const nameInput = document.getElementById('player-name').value.trim();
            if (!nameInput) {
                showMessage("請輸入你的暱稱再上傳喔！", true);
                return;
            }
            if (GAS_URL.includes("YOUR_GOOGLE_APPS_SCRIPT")) {
                showMessage("開發者提示：尚未設定 GAS_URL 變數，無法同步資料。", true);
                return;
            }

            els.systemMsg.classList.add('hidden');
            const btn = document.getElementById('btn-submit');
            btn.innerHTML = "⏳ 資料上傳中...";
            btn.disabled = true;

            const payload = {
                name: nameInput,
                score: score,
                time: secondsElapsed
            };

            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8"
                    }
                });
                
                btn.classList.add('hidden');
                document.getElementById('submit-msg').classList.remove('hidden');
            } catch (error) {
                console.error("上傳失敗", error);
                showMessage("上傳失敗，請確認網路連線。", true);
                btn.innerHTML = "📝 重新登記分數";
                btn.disabled = false;
            }
        }

        async function showLeaderboard() {
            showScreen('leaderboard');
            const listEl = document.getElementById('leaderboard-list');
            const loading = document.getElementById('loading-leaderboard');
            listEl.innerHTML = "";
            loading.classList.remove('hidden');

            if (GAS_URL.includes("YOUR_GOOGLE_APPS_SCRIPT")) {
                loading.classList.add('hidden');
                listEl.innerHTML = `<div class="text-center text-red-500 py-10">無法讀取：<br>尚未設定後端 Google Apps Script 網址。</div>`;
                return;
            }

            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                
                loading.classList.add('hidden');

                if (data.length === 0) {
                    listEl.innerHTML = `<div class="text-center text-gray-500 py-10">目前還沒有英雄登記喔！<br>趕快成為第一個吧！</div>`;
                    return;
                }

                data.forEach((row, index) => {
                    let rankStyle = "bg-gray-800 border-gray-700 text-gray-300";
                    let rankIcon = `#${index + 1}`;
                    if (index === 0) { rankStyle = "bg-yellow-900/40 border-yellow-500 text-yellow-300"; rankIcon = "🥇"; }
                    if (index === 1) { rankStyle = "bg-gray-400/20 border-gray-400 text-gray-300"; rankIcon = "🥈"; }
                    if (index === 2) { rankStyle = "bg-orange-900/40 border-orange-500 text-orange-300"; rankIcon = "🥉"; }

                    const m = String(Math.floor(row.time / 60)).padStart(2, '0');
                    const s = String(row.time % 60).padStart(2, '0');

                    listEl.innerHTML += `
                        <div class="flex items-center justify-between p-4 rounded-xl border ${rankStyle} hover:bg-gray-700/50 transition">
                            <div class="flex items-center gap-4">
                                <span class="text-2xl font-black w-8 text-center">${rankIcon}</span>
                                <span class="font-bold text-lg">${row.name}</span>
                            </div>
                            <div class="text-right">
                                <div class="text-xl font-black text-green-400">${row.score} <span class="text-xs font-normal text-gray-400">分</span></div>
                                <div class="text-xs text-blue-300 font-mono tracking-wider">⏱️ ${m}:${s}</div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                loading.classList.add('hidden');
                listEl.innerHTML = `<div class="text-center text-red-500 py-10">讀取排行榜失敗，請重新整理或確認網路。</div>`;
            }
        }
    </script>
</body>
</html>
